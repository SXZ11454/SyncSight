appId: com.syncsight.app
productName: SyncSight
copyright: Copyright © 2026 SXZ11454

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
