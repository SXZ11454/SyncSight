<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title data-i18n="cameraWindow.title">SyncSight - 摄像头预览</title>
  <link rel="stylesheet" href="../assets/mdui.css" />
  <link rel="stylesheet" href="../assets/icon.css" />
  <link rel="stylesheet" href="./css/camera-preview.css" />
  <script src="../assets/mdui.global.js"></script>
  <script src="../js/i18n.js"></script>
</head>
<body>
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div class="loading" id="loading">
    <i class="material-icons">progress_activity</i>
    <span data-i18n="cameraWindow.connecting">正在连接摄像头...</span>
  </div>
  <div class="controls">
    <span class="title">
      <i class="material-icons">photo_camera</i>
      <span data-i18n="cameraWindow.title">摄像头预览</span>
    </span>
    <button id="closeBtn" data-i18n-title="cameraWindow.close" data-i18n="cameraWindow.close" title="关闭">
      <i class="material-icons">close</i>
    </button>
  </div>
  <script>
    // Initialize i18n
    I18n.init('zh-CN');
    I18n.updateDOM();

    const video = document.getElementById('cameraVideo');
    const loading = document.getElementById('loading');
    
    // 接收摄像头设备 ID 和分辨率
    window.electronAPI.onCameraStream(async (data) => {
      console.log('[CAMERA-WINDOW] Starting camera:', data);
      try {
        const constraints = {
          video: data.deviceId ? { deviceId: { exact: data.deviceId } } : {}
        };
        // 如果指定了分辨率
        if (data.width && data.height) {
          constraints.video.width = { ideal: data.width };
          constraints.video.height = { ideal: data.height };
        }
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        loading.style.display = 'none';
        
        // 获取实际分辨率并通知主进程宽高比
        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        const ratio = settings.width / settings.height;
        console.log('[CAMERA-WINDOW] Resolution:', settings.width, 'x', settings.height, 'ratio:', ratio);
        window.electronAPI.setAspectRatio(ratio);
        
        console.log('[CAMERA-WINDOW] Camera started');
      } catch (err) {
        console.error('[CAMERA-WINDOW] Camera error:', err);
        loading.textContent = I18n.t('cameraWindow.startFailed');
      }
    });
    
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.electronAPI.closeCameraWindow();
    });
  </script>
</body>
</html>
