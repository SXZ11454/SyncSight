<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="receiver.title">SyncSight - 屏幕接收端</title>
  <link rel="stylesheet" href="/assets/mdui.css" />
  <link rel="stylesheet" href="/assets/icon.css" />
  <link rel="stylesheet" href="/css/receiver.css" />
  <script src="/assets/mdui.global.js"></script>
  <script src="/socket.io.min.js"></script>
  <script src="/js/i18n.js"></script>
</head>
<body>
  <video id="video" autoplay playsinline controls></video>

  <!-- 访问控制覆盖层 -->
  <div id="access-overlay">
    <div class="access-card">
      <i class="material-icons" id="access-icon">lock</i>
      <h2 id="access-title" data-i18n="access.verifyTitle">需要验证</h2>
      <p id="access-desc"></p>
      <div id="access-content"></div>
      <div id="access-status"></div>
    </div>
  </div>

  <!-- 浮动面板 -->
  <div id="panel">
    <mdui-fab id="panel-toggle" icon="settings" variant="surface"></mdui-fab>
    <div id="panel-body">
      <!-- 连接状态 -->
      <div class="panel-row" id="status">
        <i class="material-icons">wifi_find</i>
        <span data-i18n="receiver.connecting">正在连接...</span>
      </div>
      <!-- 分隔线 -->
      <div class="panel-divider"></div>
      <!-- Seed 徽章 -->
      <div class="panel-row" id="seed-badge">
        <i class="material-icons">hub</i>
        <span data-i18n="receiver.seedBadge">SEED 中继</span>
      </div>
      <!-- 连入模式 -->
      <div class="panel-row" id="access-mode-row" style="display:none;">
        <i class="material-icons">lock</i>
        <span id="access-mode-text"></span>
      </div>
      <!-- 分隔线 -->
      <div class="panel-divider"></div>
      <!-- 语言选择 -->
      <div class="panel-row" id="lang-wrapper">
        <i class="material-icons">language</i>
        <mdui-select id="langSelect" variant="outlined" value="auto">
          <mdui-menu-item value="auto" data-i18n="receiver.langAuto">自动选择 (简体中文)</mdui-menu-item>
          <mdui-menu-item value="zh-CN" data-i18n="receiver.langZh">简体中文</mdui-menu-item>
          <mdui-menu-item value="en-US" data-i18n="receiver.langEn">English</mdui-menu-item>
        </mdui-select>
      </div>
    </div>
  </div>
  <div id="error-modal">
    <i class="material-icons">error</i>
    <div id="error-title" data-i18n="receiver.errorTitle">错误</div>
    <div class="error-message" id="error-message"></div>
    <button class="close-btn" onclick="closeErrorModal()">
      <i class="material-icons">close</i>
    </button>
  </div>

  <script>
    // Initialize i18n
    const initLang = I18n.init('auto');
    document.getElementById('langSelect').value = initLang;
    I18n.updateDOM();
    updateLangAutoLabel();

    // 面板收缩/展开
    const panelBody = document.getElementById('panel-body');
    const panelToggle = document.getElementById('panel-toggle');
    let panelExpanded = true;

    panelToggle.addEventListener('click', () => {
      panelExpanded = !panelExpanded;
      panelBody.classList.toggle('collapsed', !panelExpanded);
      panelToggle.icon = panelExpanded ? 'settings' : 'settings';
      panelToggle.variant = panelExpanded ? 'surface' : 'primary';
    });

    // 语言切换
    document.getElementById('langSelect').addEventListener('change', (e) => {
      I18n.setLanguage(e.target.value);
      I18n.updateDOM();
      updateLangAutoLabel();
      updateStatusText(currentStatusKey); // 刷新状态文本
    });

    // 更新"自动选择"选项的显示文本，反映当前系统语言
    function updateLangAutoLabel() {
      const autoItem = document.querySelector('#langSelect mdui-menu-item[value="auto"]');
      if (autoItem) {
        const sysLang = I18n.detectSystemLang();
        const sysName = sysLang === 'zh-CN' ? '简体中文' : 'English';
        autoItem.textContent = I18n.t('receiver.langAuto') + ' (' + sysName + ')';
      }
    }

    console.log('[RECEIVER] Page loaded');
    
    if (typeof io === 'undefined') {
      const statusEl = document.getElementById('status');
      statusEl.textContent = I18n.t('receiver.socketNotLoaded');
      statusEl.classList.add('error-status');
      throw new Error('Socket.IO not loaded');
    }

    const socket = io();
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const seedBadge = document.getElementById('seed-badge');
    const accessModeRow = document.getElementById('access-mode-row');
    const accessModeText = document.getElementById('access-mode-text');

    // 显示连入模式
    function showAccessMode(mode) {
      if (!mode || mode === 'public') {
        accessModeRow.style.display = 'none';
        return;
      }
      accessModeRow.style.display = 'flex';
      const modeLabels = {
        invite: I18n.t('access.invite'),
        password: I18n.t('access.password'),
        approval: I18n.t('access.approval')
      };
      accessModeText.textContent = modeLabels[mode] || mode;
    }
    
    // 页面加载后 0.5 秒尝试播放（解锁音频自动播放）
    setTimeout(() => {
      video.play().catch(() => {});
    }, 500);
    
    // 接收流相关
    let peerConnection = null;       // 接收流的 PeerConnection
    let remoteStream = null;         // 接收到的远程流
    let currentRoomId = null;
    let currentMode = 'star';        // 当前房间模式
    let isFullscreen = false;
    let currentStatusKey = 'receiver.connecting'; // 当前状态文本的 i18n key
    
    // BT 模式 - 中继发送相关
    let relayConnections = new Map(); // targetSocketId -> RTCPeerConnection (作为中继发送流给其他客户端)
    let isSeed = false;              // 是否已注册为 seed

    // 更新状态文本（支持 i18n 刷新）
    function updateStatusText(i18nKey) {
      currentStatusKey = i18nKey;
      status.textContent = I18n.t(i18nKey);
    }

    // 错误弹窗管理
    function showError(message) {
      const errorModal = document.getElementById('error-modal');
      const errorMessage = document.getElementById('error-message');
      errorMessage.textContent = message;
      errorModal.classList.add('show');
      if (isFullscreen) exitFullscreen();
    }

    function closeErrorModal() {
      document.getElementById('error-modal').classList.remove('show');
    }

    // 全屏管理
    function updateFullscreenState() {
      isFullscreen = !!document.fullscreenElement;
    }

    function exitFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }

    video.addEventListener('fullscreenchange', updateFullscreenState);
    video.addEventListener('webkitfullscreenchange', updateFullscreenState);

    video.addEventListener('dblclick', () => {
      if (!document.fullscreenElement) {
        video.requestFullscreen().catch(() => {});
      } else {
        exitFullscreen();
      }
    });

    // 点击画面播放（解决自动播放限制）
    video.addEventListener('click', () => {
      if (video.paused) {
        video.play().catch(() => {});
      }
    });

    // STUN 服务器配置
    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
      ]
    };

    // ============ 访问控制 ============
    const accessOverlay = document.getElementById('access-overlay');
    const accessIcon = document.getElementById('access-icon');
    const accessTitle = document.getElementById('access-title');
    const accessDesc = document.getElementById('access-desc');
    const accessContent = document.getElementById('access-content');
    const accessStatus = document.getElementById('access-status');
    let accessCredentials = {}; // { token, password }

    // 解析 URL 参数获取邀请 token
    function parseUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (token) {
        accessCredentials.token = token;
      }
    }

    // 显示访问验证 UI
    function showAccessUI(mode) {
      accessOverlay.classList.add('show');
      accessStatus.textContent = '';
      accessStatus.className = '';

      switch (mode) {
        case 'password':
          accessIcon.textContent = 'lock';
          accessTitle.textContent = I18n.t('access.passwordTitle');
          accessDesc.textContent = I18n.t('access.passwordDesc');
          accessContent.innerHTML = `
            <mdui-text-field id="pwdInput" variant="outlined" type="text" maxlength="32" placeholder="${I18n.t('access.enterPassword')}"></mdui-text-field>
            <mdui-button id="pwdSubmit" variant="filled" onclick="submitPassword()">${I18n.t('access.submit')}</mdui-button>
          `;
          break;

        case 'approval':
          accessIcon.textContent = 'person_add';
          accessTitle.textContent = I18n.t('access.approvalTitle');
          accessDesc.textContent = I18n.t('access.approvalDesc');
          accessContent.innerHTML = `
            <mdui-text-field id="nameInput" variant="outlined" placeholder="${I18n.t('access.enterName')}"></mdui-text-field>
            <mdui-button id="approvalSubmit" variant="filled" onclick="submitApproval()">${I18n.t('access.requestAccess')}</mdui-button>
          `;
          break;

        case 'invite':
          accessIcon.textContent = 'link_off';
          accessTitle.textContent = I18n.t('access.inviteTitle');
          accessDesc.textContent = I18n.t('access.inviteDesc');
          accessContent.innerHTML = `<p style="color:var(--md-sys-color-error)">${I18n.t('access.invalidInvite')}</p>`;
          accessStatus.textContent = I18n.t('access.contactHost');
          accessStatus.className = 'error';
          break;

        default:
          accessOverlay.classList.remove('show');
          break;
      }
    }

    function hideAccessUI() {
      accessOverlay.classList.remove('show');
    }

    function setAccessStatus(text, type) {
      accessStatus.textContent = text;
      accessStatus.className = type;
    }

    window.submitPassword = function() {
      const pwd = document.getElementById('pwdInput')?.value || '';
      if (!pwd) {
        setAccessStatus(I18n.t('access.passwordRequired'), 'error');
        return;
      }
      accessCredentials.password = pwd;
      setAccessStatus(I18n.t('access.verifying'), 'pending');
      tryJoinRoom();
    };

    window.submitApproval = function() {
      const name = document.getElementById('nameInput')?.value || '';
      if (!name) {
        setAccessStatus(I18n.t('access.nameRequired'), 'error');
        return;
      }
      accessCredentials.username = name;
      setAccessStatus(I18n.t('access.waitingApproval'), 'pending');
      tryJoinRoom();
    };

    // ============ 连接服务器并加入房间 ============
    parseUrlParams();
    let joinAttempted = false;

    socket.on('connect', () => {
      console.log('[RECEIVER] Socket connected, ID:', socket.id);
      updateStatusText('receiver.connected');
      
      if (!joinAttempted) {
        tryJoinRoom();
      }
    });

    async function tryJoinRoom() {
      joinAttempted = true;
      
      socket.emit('JOIN_ANY_ROOM', { 
        username: accessCredentials.username || (I18n.t('receiver.username') + '-' + Math.random().toString(36).substr(2, 5)),
        token: accessCredentials.token,
        password: accessCredentials.password
      }, (response) => {
        console.log('[RECEIVER] JOIN_ANY_ROOM response:', response);
        
        if (response.success) {
          hideAccessUI();
          currentRoomId = response.roomId;
          currentMode = response.mode || 'star';
          showAccessMode(response.accessMode);
          console.log('[RECEIVER] Joined room:', currentRoomId, 'Mode:', currentMode);
          
          if (currentMode === 'bt' && response.relayFrom) {
            console.log('[RECEIVER] BT mode: Sending JOIN_REQUEST to seed:', response.relayFrom);
            updateStatusText('receiver.btRelaying');
            socket.emit('SIGNALING', {
              roomId: currentRoomId,
              targetId: response.relayFrom,
              type: 'JOIN_REQUEST',
              data: { socketId: socket.id }
            });
          } else {
            console.log('[RECEIVER] Sending JOIN_REQUEST to host:', response.hostId);
            updateStatusText('receiver.waitingStream');
            socket.emit('SIGNALING', {
              roomId: currentRoomId,
              targetId: response.hostId,
              type: 'JOIN_REQUEST',
              data: { socketId: socket.id }
            });
          }
        } else if (response.pending) {
          // 许可模式：等待审批
          setAccessStatus(response.message || I18n.t('access.waitingApproval'), 'pending');
        } else {
          console.error('[RECEIVER] Failed to join room:', response.error);
          const err = response.error || I18n.t('receiver.hostLeft');
          const mode = response.accessMode;
          
          // 根据 accessMode 显示对应的验证 UI
          if (mode === 'password') {
            showAccessUI('password');
            setAccessStatus(I18n.t('access.wrongPassword'), 'error');
          } else if (mode === 'invite') {
            showAccessUI('invite');
          } else if (mode === 'approval' || response.pending) {
            // 许可模式：等待审批
            showAccessUI('approval');
            setAccessStatus(response.message || I18n.t('access.waitingApproval'), 'pending');
          } else {
            showError(I18n.t('receiver.joinFailed', { error: err }));
          }
        }
      });
    }

    // 访问控制：服务器响应
    socket.on('ACCESS_DENIED', (data) => {
      console.log('[RECEIVER] Access denied:', data.reason);
      const mode = data.accessMode;
      if (mode === 'password') {
        showAccessUI('password');
        setAccessStatus(data.reason, 'error');
      } else if (mode === 'invite') {
        showAccessUI('invite');
      } else {
        setAccessStatus(data.reason, 'error');
      }
    });

    socket.on('ACCESS_APPROVED', (data) => {
      console.log('[RECEIVER] Access approved, joining room:', data.roomId);
      setAccessStatus(I18n.t('access.approved'), 'success');
      setTimeout(() => {
        hideAccessUI();
        currentRoomId = data.roomId;
        // 重新加入
        socket.emit('JOIN_ROOM', {
          roomId: data.roomId,
          username: accessCredentials.username || I18n.t('receiver.username') + '-' + Math.random().toString(36).substr(2, 5)
        }, (response) => {
          if (response.success) {
            currentMode = response.mode || 'star';
            showAccessMode(response.accessMode);
            if (currentMode === 'bt' && response.relayFrom) {
              updateStatusText('receiver.btRelaying');
              socket.emit('SIGNALING', {
                roomId: currentRoomId,
                targetId: response.relayFrom,
                type: 'JOIN_REQUEST',
                data: { socketId: socket.id }
              });
            } else {
              updateStatusText('receiver.waitingStream');
              socket.emit('SIGNALING', {
                roomId: currentRoomId,
                targetId: response.hostId,
                type: 'JOIN_REQUEST',
                data: { socketId: socket.id }
              });
            }
          }
        });
      }, 1000);
    });

    socket.on('ACCESS_REJECTED', (data) => {
      console.log('[RECEIVER] Access rejected:', data.reason);
      setAccessStatus(data.reason || I18n.t('access.rejected'), 'error');
    });

    socket.on('disconnect', () => {
      console.log('[RECEIVER] Socket disconnected');
      updateStatusText('receiver.disconnected');
    });

    socket.on('connect_error', (err) => {
      console.error('[RECEIVER] Socket connection error:', err.message);
      showError(I18n.t('receiver.connectError', { error: err.message }));
    });

    // ============ 信令消息处理 ============
    socket.on('SIGNALING', async (message) => {
      console.log('[RECEIVER] SIGNALING:', message.type, 'from:', message.fromId);
      
      if (message.type === 'OFFER') {
        await handleOffer(message);
      } else if (message.type === 'ANSWER') {
        await handleAnswer(message);
      } else if (message.type === 'ICE_CANDIDATE') {
        await handleIceCandidate(message);
      } else if (message.type === 'JOIN_REQUEST') {
        // BT 模式：其他客户端请求从本客户端获取流
        await handleRelayRequest(message);
      }
    });

    socket.on('ERROR', (data) => {
      console.error('[RECEIVER] ERROR:', data.message);
      showError(data.message);
    });

    socket.on('HOST_LEFT', () => {
      console.log('[RECEIVER] Host left');
      showError(I18n.t('receiver.hostLeft'));
      cleanupAll();
    });

    socket.on('MODE_CHANGED', (data) => {
      console.log('[RECEIVER] Mode changed to:', data.mode);
      currentMode = data.mode;
      if (data.mode === 'star') {
        // 退出 seed 模式
        isSeed = false;
        seedBadge.style.display = 'none';
        // 关闭所有中继连接
        relayConnections.forEach(pc => pc.close());
        relayConnections.clear();
      }
    });

    // ============ 接收流：处理 OFFER ============
    async function handleOffer(message) {
      try {
        const offer = message.data;
        const fromId = message.fromId;
        console.log('[RECEIVER] Handling OFFER from:', fromId);
        
        // 清理旧的接收连接
        if (peerConnection) {
          console.log('[RECEIVER] Closing old peer connection');
          peerConnection.close();
          peerConnection = null;
        }
        
        // 清理旧的视频源
        if (video.srcObject) {
          video.srcObject = null;
        }
        remoteStream = null;
        
        peerConnection = new RTCPeerConnection(rtcConfig);

        peerConnection.ontrack = (event) => {
          console.log('[RECEIVER] Received track:', event.track.kind, 'streams:', event.streams.length);
          
          // 使用 event.streams[0] 作为远程流
          if (event.streams && event.streams[0]) {
            remoteStream = event.streams[0];
          } else {
            // 如果没有 stream，手动创建
            if (!remoteStream) {
              remoteStream = new MediaStream();
            }
            remoteStream.addTrack(event.track);
          }
          
          // 始终更新 video.srcObject
          if (video.srcObject !== remoteStream) {
            video.srcObject = remoteStream;
          }
          
          if (event.track.kind === 'video') {
            updateStatusText('receiver.playing');
            
            // 尝试播放（带声音）
            video.play().then(() => {
              console.log('[RECEIVER] Playback started with audio');
            }).catch(err => {
              console.warn('[RECEIVER] Auto-play failed, user interaction needed:', err);
              updateStatusText('receiver.clickToPlay');
            });

            // BT 模式：收到流后注册为 seed
            if (currentMode === 'bt' && !isSeed) {
              registerAsSeed();
            }
          }
        };

        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit('SIGNALING', {
              roomId: currentRoomId,
              targetId: fromId,
              type: 'ICE_CANDIDATE',
              data: {
                candidate: event.candidate,
                fromId: socket.id
              }
            });
          }
        };

        peerConnection.onconnectionstatechange = () => {
          console.log('[RECEIVER] Connection state:', peerConnection.connectionState);
          
          if (peerConnection.connectionState === 'connected') {
            updateStatusText('receiver.connectedStatus');
          } else if (peerConnection.connectionState === 'failed') {
            updateStatusText('receiver.connectionFailed');
            showError(I18n.t('receiver.connectionFailed'));
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
          } else if (peerConnection.connectionState === 'disconnected') {
            updateStatusText('receiver.senderDisconnected');
            showError(I18n.t('receiver.senderDisconnected'));
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
          } else if (peerConnection.connectionState === 'closed') {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
          }
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.emit('SIGNALING', {
          roomId: currentRoomId,
          targetId: fromId,
          type: 'ANSWER',
          data: {
            type: answer.type,
            sdp: answer.sdp,
            fromId: socket.id
          }
        });
        console.log('[RECEIVER] ANSWER sent to:', fromId);
        
      } catch (err) {
        console.error('[RECEIVER] Error handling offer:', err);
        showError(I18n.t('receiver.streamError', { error: err.message }));
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
      }
    }

    // ============ BT 模式：注册为 Seed ============
    function registerAsSeed() {
      if (isSeed || !remoteStream) return;
      
      isSeed = true;
      seedBadge.style.display = 'flex';
      
      socket.emit('REGISTER_SEED', { roomId: currentRoomId });
      console.log('[RECEIVER] Registered as seed');
    }

    // ============ BT 模式：处理中继请求 ============
    async function handleRelayRequest(message) {
      if (currentMode !== 'bt') return;
      if (!remoteStream) {
        console.warn('[RECEIVER] No stream to relay');
        return;
      }

      const targetId = message.fromId;
      console.log('[RECEIVER] BT Relay request from:', targetId);

      // 如果已有中继连接，先关闭
      if (relayConnections.has(targetId)) {
        const oldPc = relayConnections.get(targetId);
        oldPc.close();
        relayConnections.delete(targetId);
      }

      try {
        const pc = new RTCPeerConnection(rtcConfig);
        
        // 将接收到的流添加到中继连接
        remoteStream.getTracks().forEach(track => {
          pc.addTrack(track, remoteStream);
          console.log('[RECEIVER] Added track to relay:', track.kind);
        });

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            socket.emit('SIGNALING', {
              roomId: currentRoomId,
              targetId: targetId,
              type: 'ICE_CANDIDATE',
              data: {
                candidate: event.candidate,
                fromId: socket.id
              }
            });
          }
        };

        pc.onconnectionstatechange = () => {
          console.log('[RECEIVER] Relay connection state:', pc.connectionState, 'to:', targetId);
          if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
            pc.close();
            relayConnections.delete(targetId);
          }
        };

        // 创建 Offer 并发送
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit('SIGNALING', {
          roomId: currentRoomId,
          targetId: targetId,
          type: 'OFFER',
          data: {
            type: offer.type,
            sdp: offer.sdp,
            fromId: socket.id
          }
        });

        relayConnections.set(targetId, pc);
        console.log('[RECEIVER] Relay offer sent to:', targetId, 'Total relays:', relayConnections.size);
        
      } catch (err) {
        console.error('[RECEIVER] Error creating relay:', err);
      }
    }

    // ============ 处理 ANSWER（中继连接的应答） ============
    async function handleAnswer(message) {
      const fromId = message.fromId;
      const answer = message.data;
      
      // 检查是否是中继连接的应答
      const relayPc = relayConnections.get(fromId);
      if (relayPc) {
        try {
          if (relayPc.signalingState === 'have-local-offer') {
            await relayPc.setRemoteDescription(new RTCSessionDescription(answer));
            console.log('[RECEIVER] Relay answer set for:', fromId);
          }
        } catch (err) {
          console.error('[RECEIVER] Error setting relay answer:', err);
        }
        return;
      }
      
      // 否则是接收连接的应答
      if (peerConnection) {
        try {
          if (peerConnection.signalingState === 'have-local-offer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            console.log('[RECEIVER] Remote description set');
          }
        } catch (err) {
          console.error('[RECEIVER] Error setting remote description:', err);
        }
      }
    }

    // ============ 处理 ICE Candidate ============
    async function handleIceCandidate(message) {
      const fromId = message.fromId;
      const candidateData = message.data;
      
      if (!candidateData || !candidateData.candidate) return;

      // 检查是否是中继连接的 ICE
      const relayPc = relayConnections.get(fromId);
      if (relayPc && relayPc.remoteDescription) {
        try {
          await relayPc.addIceCandidate(new RTCIceCandidate(candidateData.candidate));
          console.log('[RECEIVER] Relay ICE candidate added for:', fromId);
        } catch (err) {
          console.warn('[RECEIVER] Relay ICE candidate error:', err.message);
        }
        return;
      }
      
      // 接收连接的 ICE
      if (peerConnection && peerConnection.remoteDescription) {
        try {
          await peerConnection.addIceCandidate(new RTCIceCandidate(candidateData.candidate));
          console.log('[RECEIVER] ICE candidate added');
        } catch (err) {
          console.warn('[RECEIVER] ICE candidate error:', err.message);
        }
      }
    }

    // ============ 清理 ============
    function cleanupAll() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      relayConnections.forEach(pc => pc.close());
      relayConnections.clear();
      isSeed = false;
      seedBadge.style.display = 'none';
      video.srcObject = null;
      remoteStream = null;
    }
  </script>
