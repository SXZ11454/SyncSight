name: Build & Release SyncSight

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build NSIS installer
        run: npm run dist -- --publish never

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SyncSight ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/SyncSight-*-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
